name: Validate Release Tag
description: Ensures the tag is a valid semver and strictly greater than the previous release.

outputs:
  is_prerelease:
    description: "'true' if this is a pre-release tag"
    value: ${{ steps.prerelease.outputs.is_prerelease }}

runs:
  using: composite
  steps:
    - name: Detect pre-release
      id: prerelease
      shell: bash
      run: |
        if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+- ]]; then
          echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
        else
          echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Validate tag is strictly greater than previous release
      if: steps.prerelease.outputs.is_prerelease == 'false'
      shell: bash
      run: |
        CURR="${GITHUB_REF_NAME#v}"
        PREV=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${GITHUB_REF_NAME}$" | head -1 || true)
        if [ -z "$PREV" ]; then
          echo "No previous release tag found — first release, proceeding."
          exit 0
        fi
        PREV="${PREV#v}"
        if [ "$PREV" = "$CURR" ]; then
          echo "Error: v$CURR already exists as a release tag."
          exit 1
        fi
        LOWER=$(printf '%s\n%s\n' "$PREV" "$CURR" | sort -V | head -1)
        if [ "$LOWER" != "$PREV" ]; then
          echo "Error: v$CURR is not greater than previous release v$PREV"
          exit 1
        fi
        echo "Tag v$CURR is valid (previous release: v$PREV)"
